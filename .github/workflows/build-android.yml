name: Build Android Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    # ========================================
    # SETUP
    # ========================================
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # ========================================
    # CACHE - Tăng tốc độ build
    # ========================================
    - name: 💾 Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: ${{ runner.os }}-gradle-

    - name: 💾 Cache Docker
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-docker-${{ hashFiles('cmake/android.Dockerfile') }}
        restore-keys: ${{ runner.os }}-docker-

    - name: 💾 Cache Native Build
      id: cache-native
      uses: actions/cache@v4
      with:
        path: cmake/build-android-aarch64
        key: ${{ runner.os }}-native-${{ hashFiles('cmake/**', 'third_party/**', 'komelia-infra/**') }}
        restore-keys: ${{ runner.os }}-native-

    - name: 💾 Cache WebUI
      uses: actions/cache@v4
      with:
        path: |
          komelia-epub-reader/*/node_modules
          komelia-epub-reader/*/dist
        key: ${{ runner.os }}-webui-${{ hashFiles('komelia-epub-reader/**') }}
        restore-keys: ${{ runner.os }}-webui-

    # ========================================
    # BUILD DOCKER (nếu cần)
    # ========================================
    - name: 🐳 Setup Docker Buildx
      if: steps.cache-native.outputs.cache-hit != 'true'
      uses: docker/setup-buildx-action@v3

    - name: 🏗️ Build Docker Image
      if: steps.cache-native.outputs.cache-hit != 'true'
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./cmake/android.Dockerfile
        tags: komelia-build-android
        load: true
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

    # ========================================
    # BUILD NATIVE LIBRARIES
    # ========================================
    - name: 📁 Prepare Directories
      run: |
        mkdir -p cmake/build-android-aarch64
        sudo chown -R 1000:1000 .

    - name: ⏭️ Using Cached Native Libraries
      if: steps.cache-native.outputs.cache-hit == 'true'
      run: |
        echo "✅ Cache HIT - Saved ~25 minutes!"

    - name: 🔨 Build Native Libraries
      if: steps.cache-native.outputs.cache-hit != 'true'
      run: |
        echo "⚠️ Cache MISS - Building native libs (~25 min)..."
        docker run -v $PWD:/build komelia-build-android aarch64

    - name: 🔓 Fix Permissions
      run: sudo chown -R $(id -u):$(id -g) .

    - name: 📋 Copy JNI Libraries
      run: ./gradlew android-aarch64_copyJniLibs

    # ========================================
    # BUILD WEBUI
    # ========================================
    - name: 🌐 Build WebUI
      run: ./gradlew buildWebui

    # ========================================
    # BUILD DEBUG APK
    # ========================================
    - name: 🚀 Build Debug APK
      run: |
        echo "Building Debug APK (auto-signed with debug key)..."
        ./gradlew :komelia-app:assembleDebug --build-cache --parallel

    - name: 📦 Get APK Info
      id: apk
      run: |
        APK_PATH=$(find komelia-app/build/outputs/apk/debug -name "*.apk" | head -1)
        APK_NAME=$(basename "$APK_PATH")
        APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
        
        echo "path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "name=$APK_NAME" >> $GITHUB_OUTPUT
        echo "size=$APK_SIZE" >> $GITHUB_OUTPUT
        
        echo "📦 APK: $APK_NAME ($APK_SIZE)"

    # ========================================
    # UPLOAD APK
    # ========================================
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: komelia-debug-v${{ github.run_number }}
        path: ${{ steps.apk.outputs.path }}
        retention-days: 30

    # ========================================
    # CLEANUP
    # ========================================
    - name: 🧹 Cleanup
      if: always()
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

    - name: 📊 Summary
      run: |
        cat << EOF >> $GITHUB_STEP_SUMMARY
        ## ✅ Build Successful!
        
        | Info | Value |
        |------|-------|
        | 📦 APK | \`${{ steps.apk.outputs.name }}\` |
        | 📏 Size | ${{ steps.apk.outputs.size }} |
        | 🏗️ Build # | ${{ github.run_number }} |
        | ⚡ Native Cache | ${{ steps.cache-native.outputs.cache-hit == 'true' && '✅ HIT (~25 min saved)' || '❌ MISS' }} |
        
        ### 📥 Download
        Scroll up → **Artifacts** section → Download APK
        
        ### 📱 Install
        1. Copy APK to phone
        2. Enable "Install from Unknown Sources"
        3. Install APK
        4. Done! ✅
        EOF
