name: Build Android ARM64 APK

on:
  workflow_dispatch:  # Cho phép trigger thủ công
  push:
    branches: [ main ]
    paths:
      - 'komelia-app/src/androidMain/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build native libraries (ARM64) with Docker
      run: |
        docker build -t komelia-build-android . -f ./cmake/android.Dockerfile
        docker run -v $PWD:/build komelia-build-android aarch64

    - name: Copy JNI libraries
      run: ./gradlew aarch64_copyJniLibs

    - name: Build WebUI
      run: ./gradlew buildWebui

    - name: Build APK
      run: ./gradlew :komelia-app:assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: komelia-arm64-release
        path: komelia-app/build/outputs/apk/release/*.apk
